services:
  postgres:
    image: postgres:16-alpine
    container_name: avisens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: avisens
      POSTGRES_PASSWORD: avisens
      POSTGRES_DB: avisens
    ports:
      - "5432:5432"
    volumes:
      - avisens_pg_data:/var/lib/postgresql/data

volumes:
  avisens_pg_data:
