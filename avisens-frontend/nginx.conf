# Configuración de nginx para el frontend de Avisens dentro de Docker.
#
# Resuelve el problema de "localhost no funciona": el navegador NO puede
# llamar a http://backend:3000 (ese nombre solo existe dentro de la red de
# Docker). Por eso el frontend hace sus peticiones a /api (mismo origen) y
# nginx las reenvía al contenedor del backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos + enrutado de la SPA (React Router):
    # si la ruta no es un archivo real, devolver index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API: /api/auth/login  ->  http://backend:3000/auth/login
    # La barra final en proxy_pass elimina el prefijo /api antes de reenviar.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
