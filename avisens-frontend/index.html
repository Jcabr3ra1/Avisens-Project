  <!-- ── JSON-LD: FAQPage ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "¿Necesito conocimientos técnicos para usar AVISENS?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. AVISENS fue diseñado para que cualquier avicultor lo use desde el día 1. El asistente AVIA también te guía durante el onboarding paso a paso."
        }
      },
      {
        "@type": "Question",
        "name": "¿Qué pasa si no tengo internet en mi granja?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AVISENS funciona offline: los datos se guardan localmente y se sincronizan automáticamente cuando vuelve la conexión."
        }
      },
      {
        "@type": "Question",
        "name": "¿Cómo se instalan los sensores IoT?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "El kit incluye ESP32 y sensores de temperatura, humedad, CO₂ y amoníaco. La instalación toma menos de 2 horas por galpón y no requiere técnico especializado."
        }
      },
      {
        "@type": "Question",
        "name": "¿Puedo cancelar en cualquier momento?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. Sin contratos de permanencia. Cancela desde tu panel sin penalidades. Tus datos quedan disponibles para descarga por 30 días."
        }
      },
      {
        "@type": "Question",
        "name": "¿AVIA tiene acceso a los datos reales de mi granja?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. AVIA está conectado en tiempo real a todos tus sensores, alertas, inventario y ciclos de crecimiento. Responde con tus datos, no con respuestas genéricas."
        }
      },
      {
        "@type": "Question",
        "name": "¿AVISENS funciona fuera de Colombia?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AVISENS está diseñado para LATAM. Operamos en Colombia con expansión planificada a Ecuador, Perú y México en 2026."
        }
      }
    ]
  }
